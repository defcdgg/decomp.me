services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: decompme
      POSTGRES_PASSWORD: decompme
    ports:
      - "5432:5432"
    volumes:
      - ./postgres:/var/lib/postgresql/data
      - ./pgdump:/pgdump
  backend:
    build:
      context: backend
      target: dev
      args:
        - http_proxy=http://192.168.0.8:10808
        - https_proxy=http://192.168.0.8:10808
    cap_drop:
      - all
    cap_add:
      - setuid
      - setgid
      - setfcap
    environment:
      - ENABLE_SWITCH_SUPPORT=NO
      - ENABLE_IRIX_SUPPORT=NO
      - ENABLE_N64_SUPPORT=NO
      - ENABLE_GC_WII_SUPPORT=NO
      - ENABLE_NDS_ARM9_SUPPORT=NO
      - ENABLE_N3DS_SUPPORT=NO
      - ENABLE_PS2_SUPPORT=NO
      - ENABLE_PSP_SUPPORT=NO
      - ENABLE_SATURN_SUPPORT=NO
      - ENABLE_DREAMCAST_SUPPORT=NO
      - ENABLE_MACOSX_SUPPORT=NO
      - ENABLE_MSDOS_SUPPORT=NO
      - ENABLE_WIIU_SUPPORT=NO
      - ENABLE_WIN32_SUPPORT=NO
      - ENABLE_XBOX360_SUPPORT=NO
      - ENABLE_ANDROID_X86_SUPPORT=NO

    env_file:
      - backend/docker.dev.env
    ports:
      - "8000:8000"
      - "5678:5678"  # vscode debugger
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    volumes:
      - ./backend:/backend
    tmpfs:
      # Use a separate tmpfs to prevent a rogue jailed process
      # from filling /tmp on the parent container
      - /sandbox/tmp:exec,uid=1000,gid=1000,size=64M,mode=0700
  frontend:
    build:
      context: frontend
      target: dev
    environment:
      API_BASE: /api
      INTERNAL_API_BASE: http://backend:8000/api
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/frontend
      - .env:/.env
  nginx:
    image: nginx:1.28-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/development.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/geo.conf:/etc/nginx/conf.d/geo.conf:ro
      - ./frontend/down.html:/var/www/down.html:ro
      - ./backend/media:/media
      - ./backend/static:/var/www/static
